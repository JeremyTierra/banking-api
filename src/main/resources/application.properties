spring.application.name=banking-api

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Evita el anti-pattern "Open Session in View" — en APIs REST las queries
# deben resolverse en la capa de servicio, no durante la serialización HTTP
spring.jpa.open-in-view=false

# Actuator — expone /actuator/health para el healthcheck de Docker
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Frankfurter API
frankfurter.api.url=https://api.frankfurter.dev/v1/latest
